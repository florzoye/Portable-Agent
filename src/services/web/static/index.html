<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #e2e2e2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 0 20px;
    height: 52px;
    border-bottom: 0.5px solid #1f1f1f;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0f0f0f;
    flex-shrink: 0;
  }

  .logo {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #1e3a5f, #0f2540);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { opacity: 0.9; }

  header h1 { font-size: 14px; font-weight: 600; color: #c8c8c8; letter-spacing: 0.01em; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #141414;
    border: 0.5px solid #222;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: background 0.4s;
    flex-shrink: 0;
  }
  .dot.connected {
    background: #3fb950;
    box-shadow: 0 0 6px rgba(63,185,80,0.4);
  }

  .session-id {
    font-size: 11px;
    color: #4a4a4a;
    font-family: "SF Mono", Consolas, monospace;
    letter-spacing: 0.05em;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
    padding-bottom: 40px;
  }

  .empty-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: #141414;
    border: 0.5px solid #1e1e1e;
    display: flex; align-items: center; justify-content: center;
  }

  #empty-state p {
    font-size: 13px;
    color: #383838;
    letter-spacing: 0.01em;
  }

  .msg-wrap {
    display: flex;
    padding: 3px 20px;
    animation: fadein 0.18s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .msg-wrap.user { justify-content: flex-end; }
  .msg-wrap.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 70%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.65;
    word-break: break-word;
  }

  .msg-wrap.user .bubble {
    background: #162d4a;
    color: #b8d4f0;
    border-bottom-right-radius: 4px;
    border: 0.5px solid #1e3d5c;
  }

  .msg-wrap.assistant .bubble {
    background: #141414;
    color: #d8d8d8;
    border-bottom-left-radius: 4px;
    border: 0.5px solid #1e1e1e;
  }

  .bubble.error {
    background: #1e0f0f;
    border-color: #3d1a1a;
    color: #d07070;
  }

  .bubble b, .bubble strong { color: #f0f0f0; font-weight: 600; }
  .bubble a { color: #4d8fbf; text-decoration: none; border-bottom: 0.5px solid #4d8fbf; }
  .bubble code {
    background: #1e1e1e;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12.5px;
    font-family: "SF Mono", Consolas, monospace;
    color: #c0c0c0;
  }
  .bubble pre {
    background: #111;
    border: 0.5px solid #222;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 5px 0; }
  .bubble li { margin: 2px 0; }
  .bubble p { margin: 4px 0; }

  .typing .bubble {
    display: flex;
    align-items: center;
    padding: 12px 16px;
  }
  .dot-pulse { display: flex; gap: 5px; }
  .dot-pulse span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #333;
    animation: pulse 1.2s infinite;
  }
  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,80%,100% { opacity: 0.3; transform: scale(0.75); }
    40% { opacity: 1; transform: scale(1); }
  }

  footer {
    padding: 10px 16px 14px;
    border-top: 0.5px solid #161616;
    background: #0f0f0f;
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #141414;
    border: 0.5px solid #242424;
    border-radius: 13px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.2s;
  }
  #input-row:focus-within { border-color: #2e2e2e; }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #ddd;
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    font-family: inherit;
    overflow-y: auto;
  }
  #input::placeholder { color: #363636; }

  #send-btn {
    background: #162d4a;
    border: 0.5px solid #1e3d5c;
    border-radius: 9px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #5a9ad0;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover:not(:disabled) { background: #1e3d5c; color: #88c0f0; }
  #send-btn:active:not(:disabled) { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint {
    font-size: 11px;
    color: #282828;
    text-align: center;
    margin-top: 7px;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5a9ad0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </div>
  <h1>AI Assistant</h1>
  <div class="header-right">
    <div class="status-pill">
      <div class="dot" id="status-dot"></div>
      <span class="session-id" id="session-label">——————</span>
    </div>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2e2e2e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <p>Отправьте сообщение, чтобы начать</p>
  </div>
</div>

<footer>
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Введите сообщение…" disabled></textarea>
    <button id="send-btn" disabled title="Отправить">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="hint">Enter — отправить · Shift+Enter — новая строка</p>
</footer>

<script>
  function getOrCreateSession() {
    let id = sessionStorage.getItem("chat_session");
    if (!id) {
      id = String(Math.floor(10000000 + Math.random() * 90000000));
      sessionStorage.setItem("chat_session", id);
    }
    return id;
  }

  const SESSION_ID = getOrCreateSession();
  document.getElementById("session-label").textContent = SESSION_ID;

  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("empty-state");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const statusDot = document.getElementById("status-dot");

  let ws;
  let isWaiting = false;

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/${SESSION_ID}`);

    ws.onopen = () => {
      statusDot.classList.add("connected");
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = () => {
      statusDot.classList.remove("connected");
      inputEl.disabled = true;
      sendBtn.disabled = true;
      setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      removeTyping();
      isWaiting = false;
      sendBtn.disabled = false;

      if (data.type === "message") {
        appendBubble("assistant", data.content, false);
      } else if (data.type === "error") {
        appendBubble("assistant", data.content, true);
      }
    };
  }

  function appendBubble(role, html, isError = false) {
    emptyState.style.display = "none";
    const wrap = document.createElement("div");
    wrap.className = `msg-wrap ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isError ? " error" : "");
    if (role === "user") {
      bubble.textContent = html;
    } else {
      bubble.innerHTML = html;
    }
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap assistant typing";
    wrap.id = "typing-indicator";
    wrap.innerHTML = `<div class="bubble"><div class="dot-pulse"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting || ws.readyState !== WebSocket.OPEN) return;
    appendBubble("user", text);
    ws.send(text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    isWaiting = true;
    sendBtn.disabled = true;
    showTyping();
  }

  sendBtn.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  connect();
</script>
</body>
</html>
